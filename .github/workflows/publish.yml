name: Publish

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  x86_64:
      runs-on: ubuntu-22.04
      name: Build x86_64 and mipsle
      steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Retrieve version
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          VERSION=$(git describe --abbrev=0)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        id: version
      - name: Print main version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git describe
          git describe --abbrev=0
          git describe --tags --abbrev=0
          echo "$VERSION"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
      - name: Install requirements
        run: |
          sudo apt-get -y update
          sudo apt-get install -y wireguard-tools upx-ucl

      - name: Build x86_64
        run: |
          make all static

      - uses: actions/upload-artifact@v4
        with:
          name: etherguard-x86_64
          path: etherguard-go*

      - name: Build mipsle
        run: |
          make clean
          GOOS=linux GOARCH=mipsle GOMIPS=softfloat make all static
          upx -9 etherguard-go*

      - uses: actions/upload-artifact@v4
        with:
          name: etherguard-mipsle
          path: etherguard-go*

  multi-arch:
    runs-on: ubuntu-22.04
    name: Build on Ubuntu 20.04 ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: aarch64
          - arch: armv7
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Retrieve version
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          VERSION=$(git describe --abbrev=0)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        id: version
      - name: Print main version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git describe
          git describe --abbrev=0
          git describe --tags --abbrev=0
          echo "$VERSION"
      - uses: uraimo/run-on-arch-action@cd5f294c3b7be88bc5b708fe25e1af36818f9ead # v2.0.5
        name: Build artifact
        id: build
        with:
          arch: ${{ matrix.arch }}
          distro: ubuntu20.04
          setup: |
            mkdir -p "${PWD}/artifacts"
          dockerRunArgs: |
            --volume "${PWD}/artifacts:/artifacts"
          env: |
            artifact_dir: ${{ matrix.arch }}
          shell: /bin/sh
          install: |
            apt-get -y update

            apt-get install -y ca-certificates curl software-properties-common

            echo "deb [trusted=yes] https://packagecloud.io/fdio/release/ubuntu focal main" > /etc/apt/sources.list.d/99fd.io.list
            curl -L https://packagecloud.io/fdio/release/gpgkey | apt-key add -
            apt-get -y update
            apt-get install -y libmemif libmemif-dev || true
            apt-get install -y wireguard-tools build-essential git

            case "$(uname -m)" in
              aarch64)
                go_archive=go1.26.5.linux-arm64.tar.gz
                go_sha256=fe4789e92b1f33358680864bbe8704289e7bb5fc207d80623c308935bd696d49
                ;;
              armv7l|armv6l)
                go_archive=go1.26.5.linux-armv6l.tar.gz
                go_sha256=6dae9edab81c13bccf962dec15f1fd2ec26c14a6821b4d2c92dab4130c289d7a
                ;;
              *)
                echo "unsupported build architecture: $(uname -m)" >&2
                exit 1
                ;;
            esac
            curl -fsSL "https://go.dev/dl/${go_archive}" -o "/tmp/${go_archive}"
            echo "${go_sha256}  /tmp/${go_archive}" | sha256sum -c -
            rm -rf /usr/local/go
            tar -C /usr/local -xzf "/tmp/${go_archive}"
            ln -sf /usr/local/go/bin/go /usr/local/bin/go
            go version
          run: |
            make all static
            mkdir /artifacts/${artifact_dir}
            cp etherguard-go* /artifacts/${artifact_dir}

      - uses: actions/upload-artifact@v4

        if: ${{ matrix.arch == 'armv7' }}
        with:
          name: etherguard-arm32
          path: artifacts/armv7
      - uses: actions/upload-artifact@v4
        if: ${{ matrix.arch == 'aarch64' }}
        with:
          name: etherguard-arm64
          path: artifacts/aarch64

  windows:
    runs-on: windows-2022
    name: Build Windows amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
      - name: Build and checksum
        shell: pwsh
        run: |
          go build -o etherguard-go-windows-amd64.exe .
          $hash = (Get-FileHash etherguard-go-windows-amd64.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *etherguard-go-windows-amd64.exe" | Set-Content -Encoding ascii etherguard-go-windows-amd64.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: etherguard-windows-amd64
          path: |
            etherguard-go-windows-amd64.exe
            etherguard-go-windows-amd64.exe.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - x86_64
      - multi-arch
      - windows
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: etherguard-*
          path: artifacts
      - name: Prepare release assets
        shell: bash
        run: |
          mkdir release
          cp artifacts/etherguard-x86_64/etherguard-go release/etherguard-go-x86_64
          cp artifacts/etherguard-x86_64/etherguard-go-static release/etherguard-go-static-x86_64
          cp artifacts/etherguard-mipsle/etherguard-go release/etherguard-go-mipsle
          cp artifacts/etherguard-mipsle/etherguard-go-static release/etherguard-go-static-mipsle
          cp artifacts/etherguard-arm32/etherguard-go release/etherguard-go-armv7
          cp artifacts/etherguard-arm32/etherguard-go-static release/etherguard-go-static-armv7
          cp artifacts/etherguard-arm64/etherguard-go release/etherguard-go-aarch64
          cp artifacts/etherguard-arm64/etherguard-go-static release/etherguard-go-static-aarch64
          cp artifacts/etherguard-windows-amd64/etherguard-go-windows-amd64.exe release/
          cp artifacts/etherguard-windows-amd64/etherguard-go-windows-amd64.exe.sha256 release/
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" release/* --clobber
